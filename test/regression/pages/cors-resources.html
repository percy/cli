<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CORS Resources Regression Test</title>
  <link rel="stylesheet" href="/assets/css/base.css">
  <!-- Cross-origin CSS from CORS server -->
  <!-- nosemgrep: html.security.missing-integrity.missing-integrity -- localhost test server, no SRI needed -->
  <link rel="stylesheet" href="http://localhost:9101/css/base.css" crossorigin="anonymous">
</head>
<body>
  <h1>CORS Resources</h1>

  <!-- Cross-origin CSS loaded above -->
  <div class="section">
    <div class="section-title">Cross-origin CSS</div>
    <p>This page loads a stylesheet from <code>http://localhost:9101/css/base.css</code>.</p>
    <p>Percy must discover and capture this cross-origin resource via allowedHostnames.</p>
  </div>

  <!-- Cross-origin image -->
  <div class="section">
    <div class="section-title">Cross-origin Image</div>
    <img src="http://localhost:9101/images/logo.png" alt="Cross-origin image" width="100" height="100" crossorigin="anonymous">
  </div>

  <!-- Cross-origin font -->
  <div class="section">
    <div class="section-title">Cross-origin Font</div>
    <style>
      @font-face {
        font-family: 'CorsTestFont';
        src: url('http://localhost:9101/fonts/test-font.woff2') format('woff2');
        font-display: block;
      }
      .cors-font-text { font-family: 'CorsTestFont', monospace; font-size: 18px; }
    </style>
    <p class="cors-font-text">Text using a font loaded from the CORS server.</p>
  </div>
</body>
</html>
