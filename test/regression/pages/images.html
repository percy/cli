<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Images Regression Test</title>
  <link rel="stylesheet" href="/assets/css/base.css">
</head>
<body>
  <h1>Images</h1>

  <!-- Basic image -->
  <div class="section">
    <div class="section-title">Basic PNG Image</div>
    <img src="/assets/images/logo.png" alt="Logo PNG" width="100" height="100">
  </div>

  <!-- srcset -->
  <div class="section">
    <div class="section-title">srcset Image</div>
    <img srcset="/assets/images/picture-sm.jpg 375w, /assets/images/picture-lg.jpg 1280w"
         sizes="(max-width: 375px) 375px, 1280px"
         src="/assets/images/picture-lg.jpg"
         alt="Responsive srcset image"
         width="200" height="150">
  </div>

  <!-- picture element -->
  <div class="section">
    <div class="section-title">Picture Element</div>
    <picture>
      <source media="(max-width: 375px)" srcset="/assets/images/picture-sm.jpg">
      <source media="(min-width: 376px)" srcset="/assets/images/picture-lg.jpg">
      <img src="/assets/images/picture-lg.jpg" alt="Picture element fallback" width="200" height="150">
    </picture>
  </div>

  <!-- Lazy-loaded image (Percy removes loading="lazy") -->
  <div class="section">
    <div class="section-title">Lazy-loaded Image</div>
    <img loading="lazy" src="/assets/images/photo.jpg" alt="Lazy loaded photo" width="100" height="100">
  </div>

  <!-- Inline base64 image -->
  <div class="section">
    <div class="section-title">Base64 Inline Image</div>
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAoAAAAKCAYAAACNMs+9AAAAFklEQVQYV2P8z8BQz0AEYBxVOHIUAgBGWAkFdYFJrgAAAABJRU5ErkJggg==" alt="Base64 inline" width="50" height="50" style="image-rendering: pixelated;">
  </div>

  <!-- SVG image -->
  <div class="section">
    <div class="section-title">SVG Image</div>
    <img src="/assets/images/icon.svg" alt="SVG icon" width="48" height="48">
  </div>

  <!-- JPEG image -->
  <div class="section">
    <div class="section-title">JPEG Image</div>
    <img src="/assets/images/photo.jpg" alt="JPEG photo" width="100" height="100">
  </div>
</body>
</html>
