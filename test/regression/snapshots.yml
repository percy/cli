# Percy CLI E2E Regression Test Snapshots
# To add a new test: create an HTML page in pages/ and add an entry here.
# Each entry can override any Percy snapshot/discovery option.

# Comprehensive smoke test — includes video poster, base64 inline image, pseudo-class CSS
- name: Comprehensive
  url: /comprehensive.html
  widths: [1280]

# Individual feature pages
- name: Shadow DOM
  url: /shadow-dom.html
  widths: [1280]

- name: Iframes
  url: /iframes.html
  widths: [1280]

- name: CORS Iframes
  url: /cors-iframes.html
  widths: [1280]

- name: CSSOM
  url: /cssom.html
  widths: [1280]

- name: Fonts
  url: /fonts.html
  widths: [1280]

- name: Canvas
  url: /canvas.html
  widths: [1280]

- name: Images
  url: /images.html
  widths: [1280]

- name: CORS Resources
  url: /cors-resources.html
  widths: [1280]

- name: Redirected Resources
  url: /redirects.html
  widths: [1280]

- name: JavaScript Enabled
  url: /js-enabled.html
  widths: [1280]
  enableJavaScript: true

- name: Responsive
  url: /responsive.html
  widths: [375, 768, 1280]

- name: DOM Structures Coverage
  url: /dom-structures.html
  widths: [1280]
  ignoreIframeSelectors:
    - '.ad-frame'

# Interactive states (:focus/:focus-within/:checked/:disabled), forced
# :hover/:active via pseudoClassEnabledElements, ElementInternals :state(),
# closed shadow roots (multiple shapes), nested shadows, :host/::slotted,
# adopted stylesheets, and lazy-defined custom elements.
- name: Interactive States & Custom States
  url: /interactive-states.html
  widths: [1280]
  pseudoClassEnabledElements:
    selectors:
      - '.hover-test'
      - '.active-test'

# Hydration: page begins as plain HTML and is upgraded by JS post-load.
# Capture must happen after hydration completes so the upgraded DOM is
# what's serialized.
- name: Hydration
  url: /hydration.html
  widths: [1280]

# Sandboxed iframes (4 sandbox token combinations) and 3-level nested
# iframes to exercise the depth-limit boundary.
- name: Sandbox & Nested Iframes
  url: /sandbox-iframes.html
  widths: [1280]
