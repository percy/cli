name: Test
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
jobs:
  # Detect whether a PR's diff is confined to the version files that version-bump.yml
  # is allowed to commit (lerna.json + packages/**/package.json). Combined with the
  # `release/` branch check on the heavy jobs below, this lets us skip the ~1h matrix
  # for genuine version-bump PRs while still running it for any `release/*` PR that
  # touches source — so the skip can't be abused to land untested code behind a
  # green-looking "skipped" check (PER-9560).
  changes:
    name: Detect version-only changes
    runs-on: ubuntu-latest
    outputs:
      version_only: ${{ steps.filter.outputs.version_only }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        # Only meaningful for PRs; on push/workflow_dispatch the step is skipped, the
        # output is empty, and the branch check below already evaluates to "run".
        if: github.event_name == 'pull_request'
        with:
          # `every`: version_only is true ONLY when every changed file matches a pattern.
          predicate-quantifier: every
          filters: |
            version_only:
              - 'lerna.json'
              - 'packages/**/package.json'

  build:
    name: Build
    # Skip the ~1h test matrix on automated version-bump PRs. version-bump.yml opens
    # these from `release/<version>` branches and commits only lerna.json +
    # packages/**/package.json, so there's nothing to test. We skip only when BOTH hold
    # — branch is `release/*` AND the diff is version-only — so a `release/*` PR that
    # touches source still runs the full suite (PER-9560). Implemented as a job-level
    # `if` (not an `on:` branch filter) so the check still reports as "skipped" — which
    # satisfies a required status check — instead of staying "pending" and blocking the
    # release PR from merging.
    needs: [changes]
    if: ${{ !(startsWith(github.head_ref, 'release/') && needs.changes.outputs.version_only == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v3
        with:
          node-version: 14
      - uses: actions/cache@v3
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/core/.local-chromium
          key: >
            ${{ runner.os }}/node-14/
            ${{ hashFiles('.github/.cache-key') }}/
            ${{ hashFiles('**/yarn.lock') }}
          restore-keys: >
            ${{ runner.os }}/node-14/
            ${{ hashFiles('.github/.cache-key') }}/
      - run: yarn
      - run: yarn build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/*/dist

  test:
    name: Test ${{ matrix.package }}
    needs: [build, changes]
    # Skip on version-only version-bump PRs — see the build job and PER-9560.
    if: ${{ !(startsWith(github.head_ref, 'release/') && needs.changes.outputs.version_only == 'true') }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [14]
        package:
          - '@percy/env'
          - '@percy/client'
          - '@percy/dom'
          - '@percy/logger'
          - '@percy/config'
          - '@percy/core'
          - '@percy/cli'
          - '@percy/cli-command'
          - '@percy/cli-exec'
          - '@percy/cli-snapshot'
          - '@percy/cli-upload'
          - '@percy/cli-build'
          - '@percy/cli-config'
          - '@percy/sdk-utils'
          - '@percy/webdriver-utils'
          - '@percy/monitoring'
          - '@percy/cli-doctor'
    runs-on: ${{ matrix.os }}
    # Collect failed node-test spec names so retries re-run only the specs that
    # flaked instead of the whole suite. Non-PERCY_ name so it doesn't trip
    # cli-doctor's env-audit tests. See PER-9011.
    env:
      CLI_TEST_FAILURES_FILE: ${{ github.workspace }}/.cli-test-failures.json
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}
      - uses: actions/cache@v3
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/core/.local-chromium
          key: >
            ${{ runner.os }}/node-${{ matrix.node }}/
            ${{ hashFiles('.github/.cache-key') }}/
            ${{ hashFiles('**/yarn.lock') }}
          restore-keys: >
            ${{ runner.os }}/node-${{ matrix.node }}/
            ${{ hashFiles('.github/.cache-key') }}/
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: packages
      - run: yarn
      - name: Install browser dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing libgbm-dev
        if: ${{ matrix.os == 'ubuntu-latest' }}
      # First attempt runs the full suite WITH coverage (enforces the 100%
      # gate) and records any failed specs.
      - name: Run tests
        continue-on-error: true
        id: retry0
        run: yarn workspace ${{ matrix.package }} test:coverage --colors
      # Retries re-run ONLY the specs that failed in the previous attempt, and
      # WITHOUT coverage (a subset can't hit the 100% threshold). If retry0
      # failed with no recorded spec failures (e.g. a real coverage drop), the
      # runner preserves that failure instead of masking it. See PER-9011.
      - name: Run tests Retry (1/4)
        continue-on-error: true
        id: retry1
        if: steps.retry0.outcome=='failure'
        env:
          CLI_TEST_ONLY_FAILED: '1'
        run: yarn workspace ${{ matrix.package }} test --colors
      - name: Run tests Retry (2/4)
        continue-on-error: true
        id: retry2
        if: steps.retry1.outcome=='failure'
        env:
          CLI_TEST_ONLY_FAILED: '1'
        run: yarn workspace ${{ matrix.package }} test --colors
      - name: Run tests Retry (3/4)
        continue-on-error: true
        id: retry3
        if: steps.retry2.outcome=='failure'
        env:
          CLI_TEST_ONLY_FAILED: '1'
        run: yarn workspace ${{ matrix.package }} test --colors
      - name: Run tests Retry (4/4)
        id: retry4
        if: steps.retry3.outcome=='failure'
        env:
          CLI_TEST_ONLY_FAILED: '1'
        run: yarn workspace ${{ matrix.package }} test --colors
      # Keep "green via retry" honest: surface a warning whenever the first
      # attempt failed and a retry recovered it, so flakiness stays visible.
      - name: Flag flaky tests
        if: steps.retry0.outcome=='failure'
        run: echo "::warning title=Flaky tests::${{ matrix.package }} flaked on the first attempt and was recovered by a spec-level retry (tracked in PER-9011)."

  regression:
    name: Regression
    needs: [build, changes]
    # Skip on version-only version-bump PRs — see the build job and PER-9560.
    if: ${{ !(startsWith(github.head_ref, 'release/') && needs.changes.outputs.version_only == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 50
      - uses: actions/setup-node@v3
        with:
          node-version: 14
      - uses: actions/cache@v3
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/core/.local-chromium
          key: >
            ${{ runner.os }}/node-14/
            ${{ hashFiles('.github/.cache-key') }}/
            ${{ hashFiles('**/yarn.lock') }}
          restore-keys: >
            ${{ runner.os }}/node-14/
            ${{ hashFiles('.github/.cache-key') }}/
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: packages
      - run: yarn
      - name: Install browser dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing libgbm-dev
      - name: Set up @percy/cli
        run: |
          PERCY_PACKAGES=$(find packages -mindepth 1 -maxdepth 1 -type d | sed -e 's/packages/@percy/g' | tr '\n' ' ')
          yarn global:link
          yarn link `echo $PERCY_PACKAGES`
          npx percy --version
      - name: Run regression tests
        run: yarn test:regression
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_REGRESSION_TOKEN }}
