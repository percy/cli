name: Windows
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
jobs:
  build:
    name: Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v3
        with:
          node-version: 14
      - uses: actions/cache@v3
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/core/.local-chromium
          key: >
            ${{ runner.os }}/node-14/
            ${{ hashFiles('.github/.cache-key') }}/
            ${{ hashFiles('**/yarn.lock') }}
          restore-keys: >
            ${{ runner.os }}/node-14/
            ${{ hashFiles('.github/.cache-key') }}/
      - run: yarn
      - run: yarn build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/*/dist

  test:
    name: Test ${{ matrix.package }}
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        package:
          # PERF EXPERIMENT (PER-9011): core only, to measure the Defender effect cheaply.
          - '@percy/core'
    runs-on: windows-latest
    # Collect failed node-test spec names here so retries can re-run only the
    # specs that flaked instead of the whole ~60-min suite. See PER-9011.
    # Name is deliberately non-PERCY_ so it doesn't trip env-audit tests.
    env:
      CLI_TEST_FAILURES_FILE: ${{ github.workspace }}/.cli-test-failures.json
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v3
        with:
          node-version: 14
      - uses: actions/cache@v3
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/core/.local-chromium
          key: >
            ${{ runner.os }}/node-14/
            ${{ hashFiles('.github/.cache-key') }}/
            ${{ hashFiles('**/yarn.lock') }}
          restore-keys: >
            ${{ runner.os }}/node-14/
            ${{ hashFiles('.github/.cache-key') }}/
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: packages
      - run: yarn
      # PERF EXPERIMENT (PER-9011): reduce Windows Defender real-time scanning
      # to test whether it explains the ~4x Win/Linux gap. Best-effort; the job
      # still runs if these cmdlets are blocked by tamper protection.
      - name: Reduce Defender overhead (experiment)
        shell: pwsh
        continue-on-error: true
        run: |
          $ErrorActionPreference = 'SilentlyContinue'
          foreach ($p in @("${{ github.workspace }}", $env:RUNNER_TEMP, $env:TEMP, "$env:LOCALAPPDATA\Temp")) {
            if ($p) { Add-MpPreference -ExclusionPath $p }
          }
          foreach ($proc in @("node.exe","yarn.exe","chrome.exe","headless_shell.exe","chrome_crashpad_handler.exe")) {
            Add-MpPreference -ExclusionProcess $proc
          }
          Write-Host ("ExclusionPaths = " + (((Get-MpPreference).ExclusionPath) -join '; '))
          Write-Host ("ExclusionProcesses = " + (((Get-MpPreference).ExclusionProcess) -join '; '))
      # First attempt runs the full suite and records any failed specs.
      - name: Run tests
        continue-on-error: true
        id: retry0
        run: yarn workspace ${{ matrix.package }} test --colors
      # Retries re-run ONLY the specs that failed in the previous attempt
      # (CLI_TEST_ONLY_FAILED), so a flaky spec costs seconds, not ~60 min.
      - name: Run tests Retry (1/4)
        continue-on-error: true
        id: retry1
        if: steps.retry0.outcome=='failure'
        env:
          CLI_TEST_ONLY_FAILED: '1'
        run: yarn workspace ${{ matrix.package }} test --colors
      - name: Run tests Retry (2/4)
        continue-on-error: true
        id: retry2
        if: steps.retry1.outcome=='failure'
        env:
          CLI_TEST_ONLY_FAILED: '1'
        run: yarn workspace ${{ matrix.package }} test --colors
      - name: Run tests Retry (3/4)
        continue-on-error: true
        id: retry3
        if: steps.retry2.outcome=='failure'
        env:
          CLI_TEST_ONLY_FAILED: '1'
        run: yarn workspace ${{ matrix.package }} test --colors
      - name: Run tests Retry (4/4)
        id: retry4
        if: steps.retry3.outcome=='failure'
        env:
          CLI_TEST_ONLY_FAILED: '1'
        run: yarn workspace ${{ matrix.package }} test --colors
      # Keep "green via retry" honest: surface a warning whenever the first
      # attempt failed and a retry recovered it, so flakiness stays visible.
      - name: Flag flaky tests
        if: steps.retry0.outcome=='failure'
        run: echo "::warning title=Flaky Windows tests::${{ matrix.package }} flaked on the first attempt and was recovered by a spec-level retry (tracked in PER-9011)."
