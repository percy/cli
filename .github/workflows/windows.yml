name: Windows
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
jobs:
  # See test.yml for the rationale. Detects whether a PR's diff is confined to the
  # version files version-bump.yml is allowed to commit, so the skip below can't be
  # abused to land untested source behind a green-looking "skipped" check (PER-9560).
  changes:
    name: Detect version-only changes
    runs-on: ubuntu-latest
    outputs:
      version_only: ${{ steps.filter.outputs.version_only }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'pull_request'
        with:
          # `every`: version_only is true ONLY when every changed file matches a pattern.
          predicate-quantifier: every
          filters: |
            version_only:
              - 'lerna.json'
              - 'packages/**/package.json'

  build:
    name: Build
    # Skip the ~60m Windows matrix on version-only version-bump PRs (branch `release/*`
    # AND a diff confined to lerna.json + packages/**/package.json). A `release/*` PR that
    # touches source still runs the full suite (PER-9560). Job-level `if` (not an `on:`
    # branch filter) so the check posts a "skipped" result that satisfies required status
    # checks, instead of staying "pending" and blocking the release PR.
    needs: [changes]
    if: ${{ !(startsWith(github.head_ref, 'release/') && needs.changes.outputs.version_only == 'true') }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v3
        with:
          node-version: 14
      - uses: actions/cache@v3
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/core/.local-chromium
          key: >
            ${{ runner.os }}/node-14/
            ${{ hashFiles('.github/.cache-key') }}/
            ${{ hashFiles('**/yarn.lock') }}
          restore-keys: >
            ${{ runner.os }}/node-14/
            ${{ hashFiles('.github/.cache-key') }}/
      - run: yarn
      - run: yarn build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/*/dist

  test:
    name: Test ${{ matrix.package }}
    needs: [build, changes]
    # Skip on version-only version-bump PRs — see the build job and PER-9560.
    if: ${{ !(startsWith(github.head_ref, 'release/') && needs.changes.outputs.version_only == 'true') }}
    strategy:
      fail-fast: false
      matrix:
        package:
          - '@percy/env'
          - '@percy/client'
          - '@percy/dom'
          - '@percy/logger'
          - '@percy/config'
          - '@percy/core'
          - '@percy/cli'
          - '@percy/cli-command'
          - '@percy/cli-exec'
          - '@percy/cli-snapshot'
          - '@percy/cli-upload'
          - '@percy/cli-build'
          - '@percy/cli-config'
          - '@percy/sdk-utils'
          - '@percy/webdriver-utils'
          - '@percy/monitoring'
          - '@percy/cli-doctor'
    runs-on: windows-latest
    # Collect failed node-test spec names here so retries can re-run only the
    # specs that flaked instead of the whole ~60-min suite. See PER-9011.
    # Name is deliberately non-PERCY_ so it doesn't trip env-audit tests.
    env:
      CLI_TEST_FAILURES_FILE: ${{ github.workspace }}/.cli-test-failures.json
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v3
        with:
          node-version: 14
      - uses: actions/cache@v3
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/core/.local-chromium
          key: >
            ${{ runner.os }}/node-14/
            ${{ hashFiles('.github/.cache-key') }}/
            ${{ hashFiles('**/yarn.lock') }}
          restore-keys: >
            ${{ runner.os }}/node-14/
            ${{ hashFiles('.github/.cache-key') }}/
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: packages
      - run: yarn
      # First attempt runs the full suite and records any failed specs.
      - name: Run tests
        continue-on-error: true
        id: retry0
        run: yarn workspace ${{ matrix.package }} test --colors
      # Retries re-run ONLY the specs that failed in the previous attempt
      # (CLI_TEST_ONLY_FAILED), so a flaky spec costs seconds, not ~60 min.
      - name: Run tests Retry (1/4)
        continue-on-error: true
        id: retry1
        if: steps.retry0.outcome=='failure'
        env:
          CLI_TEST_ONLY_FAILED: '1'
        run: yarn workspace ${{ matrix.package }} test --colors
      - name: Run tests Retry (2/4)
        continue-on-error: true
        id: retry2
        if: steps.retry1.outcome=='failure'
        env:
          CLI_TEST_ONLY_FAILED: '1'
        run: yarn workspace ${{ matrix.package }} test --colors
      - name: Run tests Retry (3/4)
        continue-on-error: true
        id: retry3
        if: steps.retry2.outcome=='failure'
        env:
          CLI_TEST_ONLY_FAILED: '1'
        run: yarn workspace ${{ matrix.package }} test --colors
      - name: Run tests Retry (4/4)
        id: retry4
        if: steps.retry3.outcome=='failure'
        env:
          CLI_TEST_ONLY_FAILED: '1'
        run: yarn workspace ${{ matrix.package }} test --colors
      # Keep "green via retry" honest: surface a warning whenever the first
      # attempt failed and a retry recovered it, so flakiness stays visible.
      - name: Flag flaky tests
        if: steps.retry0.outcome=='failure'
        run: echo "::warning title=Flaky Windows tests::${{ matrix.package }} flaked on the first attempt and was recovered by a spec-level retry (tracked in PER-9011)."
