name: SDK Regression
on:
  issue_comment:
    types: [created, edited]
  pull_request:
    types: [labeled, synchronize, reopened]
permissions:
  contents: read
jobs:
  regression:
    name: regression
    runs-on: ubuntu-latest
    # Least-privilege: read code/PR data and write commit statuses only. Note an
    # author-permission guard below (check-access) already restricts triggering
    # to write/admin collaborators (CWE-284 / PER-8610).
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    # Run when either:
    #  - a maintainer comments RUN_REGRESSION on a PR (legacy manual path), or
    #  - the PR carries the `run-sdk-regression` label (auto path / quality gate).
    # Both paths are internal-only: only write/admin collaborators can comment-gate
    # (enforced by check-access below) or apply a label.
    if: >-
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && github.event.comment.body == 'RUN_REGRESSION') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-sdk-regression'))
    strategy:
      matrix:
        # Format: repo@branch (default branch is master)
        repo: 
          - percy-ember
          - percy-cypress
          - percy-puppeteer
          - percy-storybook
          - percy-playwright
          - percy-testcafe
          - percy-nightwatch
          - percy-nightmare
          - percy-webdriverio
          - percy-webdriverio@v2
          - percy-protractor
          - percy-selenium-js
          - percy-selenium-dotnet
          - percy-selenium-java
          - percy-selenium-python
          - percy-selenium-ruby@main
          - percy-capybara
          - percy-appium-js
          - gatsby-plugin-percy
          # Injection-capable SDKs previously missing from the fan-out.
          # Their default branch is `main`, so pin the dispatch ref with @main
          # (the split default below is `master`, which would 404 for these).
          - percy-detox@main
          - percy-playwright-python@main
          - percy-robotframework@main
          - percy-playwright-java@main
          - percy-playwright-dotnet@main
    steps:
      # Permission check applies only to the comment path; the label path is
      # already gated by GitHub (only write+ collaborators can label a PR).
      - name: Get user permissions
        if: ${{ github.event_name == 'issue_comment' }}
        uses: actions/github-script@f891eff65186019cbb3f7190c4590bc0a1b76fbc # v4.1.0
        id: check-access
        with:
          script: |
            const { owner, repo } = context.repo;
            const { login } = context.payload.comment.user;
            const { data } = await github.repos.getCollaboratorPermissionLevel({ owner, repo, username: login });
            return data.permission;
          result-encoding: string
      - name: Check Access Level
        if: ${{ github.event_name == 'issue_comment' && steps.check-access.outputs.result != 'write' && steps.check-access.outputs.result != 'admin' }}
        run: exit 1
      - uses: xt0rted/pull-request-comment-branch@e8b8daa837e8ea7331c0003c9c316a64c6d8b0b1 # v3.0.0
        if: ${{ github.event_name == 'issue_comment' }}
        id: comment-branch
      # Pass event data via env (never interpolate untrusted head.ref into the
      # shell directly). The ref is validated by the regex-match step below
      # before it is ever used to trigger a downstream workflow.
      - name: Resolve PR head ref and sha
        id: pr
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          COMMENT_HEAD_REF: ${{ steps.comment-branch.outputs.head_ref }}
          COMMENT_HEAD_SHA: ${{ steps.comment-branch.outputs.head_sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "head_ref=$PR_HEAD_REF" >> "$GITHUB_OUTPUT"
            echo "head_sha=$PR_HEAD_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "head_ref=$COMMENT_HEAD_REF" >> "$GITHUB_OUTPUT"
            echo "head_sha=$COMMENT_HEAD_SHA" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions-ecosystem/action-regex-match@9e6c4fb3d5e898f505be7a1fb6e7b0a278f6665b # v2.0.2
        id: regex-match
        with:
          text: ${{ steps.pr.outputs.head_ref }}
          regex: '^[a-zA-Z0-9_/\-]+$'
      - name: Break on invalid branch name
        run: exit 1
        if: ${{ steps.regex-match.outputs.match == '' }}

      - name: Get Current Job Log URL
        uses: Tiryoh/gha-jobid-action@be260d8673c9211a84cdcf37794ebd654ba81eef # v1.4.0
        id: job-url
        with:
          github_token: ${{ secrets.WORKFLOW_DISPATCH_ACTIONS_TOKEN }}
          job_name: "regression (${{ matrix.repo }})" 
      - name: Output Current Job Log URL
        run: echo ${{ steps.jobs.outputs.html_url }}
      - uses: actions/github-script@f891eff65186019cbb3f7190c4590bc0a1b76fbc # v4.1.0
        with:
          github-token: ${{ secrets.WORKFLOW_DISPATCH_ACTIONS_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const sha = '${{ steps.pr.outputs.head_sha }}'
            const state = 'pending';
            const target_url = '${{ steps.job-url.outputs.html_url }}'
            const check_name = 'SDK Regression ${{ matrix.repo }}'
            
            github.repos.createCommitStatus({
              context: check_name,
              owner,
              repo,
              sha,
              state,
              target_url
            });
      - uses: winterjung/split@7f51d99e7cc1f147f6f99be75acf5e641930af88 # v2.1.0
        id: split
        with:
          msg: ${{ matrix.repo }}
          separator: '@'
      - name: Trigger Workflow & Wait
        uses: convictional/trigger-workflow-and-wait@f69fa9eedd3c62a599220f4d5745230e237904be # v1.6.5
        id: reg-test
        with:
          owner: percy
          repo: ${{ steps.split.outputs._0 }}
          github_token: ${{ secrets.WORKFLOW_DISPATCH_ACTIONS_TOKEN }}
          workflow_file_name: test.yml
          ref: ${{ steps.split.outputs._1 || 'master' }}
          client_payload: '{ "branch": "${{ steps.pr.outputs.head_ref }}"}'
          wait_interval: 15
      - name: Update Status
        uses: actions/github-script@f891eff65186019cbb3f7190c4590bc0a1b76fbc # v4.1.0
        with:
          github-token: ${{ secrets.WORKFLOW_DISPATCH_ACTIONS_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const sha = '${{ steps.pr.outputs.head_sha }}'
            const state = '${{ steps.reg-test.outcome }}';
            const target_url = '${{ steps.job-url.outputs.html_url }}'
            const check_name = 'SDK Regression ${{ matrix.repo }}'

            github.repos.createCommitStatus({
              context: check_name,
              owner,
              repo,
              sha,
              state,
              target_url
            });

  # App Percy + POA run on Buildkite (real BrowserStack devices/browsers). This
  # job triggers those suites DIRECTLY via the Buildkite REST API against this
  # CLI branch, waits for the builds to finish, and posts a per-SDK pass/fail
  # table back onto the PR.
  app-poa-regression:
    name: App Percy + POA regression (Buildkite)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write          # upsert the result comment (PR comments = issue comments)
      pull-requests: write
    if: >-
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && github.event.comment.body == 'RUN_REGRESSION') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-sdk-regression'))
    steps:
      # Same internal-only guard as the web job: comment path must be write/admin.
      - name: Check access (comment path only)
        if: ${{ github.event_name == 'issue_comment' }}
        uses: actions/github-script@f891eff65186019cbb3f7190c4590bc0a1b76fbc # v4.1.0
        with:
          script: |
            const { owner, repo } = context.repo;
            const { login } = context.payload.comment.user;
            const { data } = await github.repos.getCollaboratorPermissionLevel({ owner, repo, username: login });
            if (data.permission !== 'write' && data.permission !== 'admin') {
              core.setFailed(`@${login} lacks write access for regression`);
            }
      - uses: xt0rted/pull-request-comment-branch@e8b8daa837e8ea7331c0003c9c316a64c6d8b0b1 # v3.0.0
        if: ${{ github.event_name == 'issue_comment' }}
        id: comment-branch
      # Untrusted head.ref flows via env (not interpolated into the shell) and
      # is regex-validated before it reaches the Buildkite payload.
      - name: Resolve PR head ref + number
        id: pr
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER_PR: ${{ github.event.pull_request.number }}
          PR_NUMBER_ISSUE: ${{ github.event.issue.number }}
          COMMENT_HEAD_REF: ${{ steps.comment-branch.outputs.head_ref }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "head_ref=$PR_HEAD_REF" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUMBER_PR" >> "$GITHUB_OUTPUT"
          else
            echo "head_ref=$COMMENT_HEAD_REF" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUMBER_ISSUE" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions-ecosystem/action-regex-match@9e6c4fb3d5e898f505be7a1fb6e7b0a278f6665b # v2.0.2
        id: regex-match
        with:
          text: ${{ steps.pr.outputs.head_ref }}
          regex: '^[a-zA-Z0-9_/\-]+$'
      - name: Break on invalid branch name
        if: ${{ steps.regex-match.outputs.match == '' }}
        run: exit 1
      - name: Run App Percy + POA on Buildkite, wait, and report
        env:
          BUILDKITE_API_TOKEN: ${{ secrets.BUILDKITE_API_TOKEN }}   # scope: write_builds + read_builds
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          BK_ORG: percy
          SUITES: "app-percy-sdk-regression-suite poa-sdk-regression-suite"
          POLL_INTERVAL: "30"
          MAX_WAIT_MIN: "90"
        run: |
          set -euo pipefail
          [ -n "${BUILDKITE_API_TOKEN:-}" ] || { echo "::error::BUILDKITE_API_TOKEN secret is not set"; exit 1; }
          api="https://api.buildkite.com/v2/organizations/$BK_ORG"
          auth="Authorization: Bearer $BUILDKITE_API_TOKEN"
          nums=(); slugs=(); urls=()

          # 1) Create one build per suite, CLI built from this branch.
          for slug in $SUITES; do
            body=$(jq -n --arg b "$HEAD_REF" --arg m ":robot: CLI regression for $HEAD_REF (PR #$PR_NUMBER)" \
              '{commit:"HEAD", branch:"main", message:$m, env:{CLI_BRANCH_NAME:$b, CLI_PACKAGE_TYPE:"repo"}}')
            resp=$(curl -sSf -X POST -H "$auth" -H "Content-Type: application/json" "$api/pipelines/$slug/builds" -d "$body")
            nums+=("$(echo "$resp" | jq -r '.number')")
            slugs+=("$slug")
            urls+=("$(echo "$resp" | jq -r '.web_url')")
            echo "Created $slug build #${nums[-1]}: ${urls[-1]}"
          done

          # 2) Poll until every build reaches a terminal state (or we time out).
          terminal=" passed failed canceled skipped not_run blocked "
          deadline=$(( $(date +%s) + MAX_WAIT_MIN * 60 ))
          while :; do
            done_all=1
            for i in "${!nums[@]}"; do
              st=$(curl -sSf -H "$auth" "$api/pipelines/${slugs[$i]}/builds/${nums[$i]}" | jq -r '.state')
              case "$terminal" in *" $st "*) ;; *) done_all=0 ;; esac
            done
            [ "$done_all" = 1 ] && break
            if [ "$(date +%s)" -ge "$deadline" ]; then echo "::warning::timed out after ${MAX_WAIT_MIN}m; reporting partial"; break; fi
            sleep "$POLL_INTERVAL"
          done

          # 3) Build the per-SDK result table.
          {
            echo "<!-- sdk-regression-result -->"
            echo "## 🤖 SDK Regression — App Percy + POA"
            echo ""
            echo "CLI branch \`$HEAD_REF\` (built from source) · web-SDK results post as commit statuses."
            echo ""
            echo "| Suite | SDK job | Result |"
            echo "|---|---|---|"
          } > comment.md
          overall_fail=0
          # The bootstrap step that uploads the matrix is named after the pipeline
          # ("App-Percy-SDK-tests" / "POA-SDK-tests"); exclude it and the unnamed
          # wait job so the table is only the real per-SDK device jobs.
          for i in "${!nums[@]}"; do
            jobs=$(curl -sSf -H "$auth" "$api/pipelines/${slugs[$i]}/builds/${nums[$i]}")
            echo "$jobs" | jq -r --arg s "${slugs[$i]}" '
              .jobs[]
              | select(.type=="script" and .name != null and .name != "")
              | select(.name != "App-Percy-SDK-tests" and .name != "POA-SDK-tests")
              | "| \($s) | \(.name) | " + (if .state=="passed" then "✅ pass" else "❌ " + (.state // "n/a") end) + " |"' >> comment.md
            if echo "$jobs" | jq -e '
              .jobs[]
              | select(.type=="script" and .name != "App-Percy-SDK-tests" and .name != "POA-SDK-tests")
              | select(.state=="failed" or .state=="canceled")' >/dev/null; then
              overall_fail=1
            fi
          done
          {
            echo ""
            for i in "${!nums[@]}"; do echo "- [\`${slugs[$i]}\` build #${nums[$i]}](${urls[$i]})"; done
          } >> comment.md

          # 4) Upsert the marker comment on the PR (create, or edit the previous one).
          jq -n --rawfile b comment.md '{body:$b}' > payload.json
          existing=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate \
            --jq '.[] | select(.body | startswith("<!-- sdk-regression-result -->")) | .id' | head -n1 || true)
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$existing" --input payload.json >/dev/null
          else
            gh api -X POST "repos/$REPO/issues/$PR_NUMBER/comments" --input payload.json >/dev/null
          fi
          echo "Reported App/POA results to PR #$PR_NUMBER"
          [ "$overall_fail" = 0 ] || { echo "::error::App/POA regression had failures"; exit 1; }
