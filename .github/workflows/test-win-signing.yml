name: Test Windows KMS Signing
on:
  workflow_dispatch:
jobs:
  build:
    name: Build Win Executable
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 14
          architecture: x64
      - name: Build executables
        run: |
          brew install gnu-sed
          npm install -g pkg
          yarn install
          yarn build
          gsed -i '/"type": "module",/{s///;h};${x;/./{x;q0};x;q1}' ./package.json
          array=($(ls -d ./packages/*/package.json))
          delete=(./packages/dom/package.json ./packages/sdk-utils/package.json)
          for del in ${delete[@]}; do array=("${array[@]/$del}"); done
          for package in "${array[@]}"; do
            if [ ! -z "$package" ]; then
              gsed -i '/"type": "module",/{s///;h};${x;/./{x;q0};x;q1}' $package
            fi
          done
          echo "import { cli } from '@percy/cli';\
          $(cat ./packages/cli/dist/percy.js)" > ./packages/cli/dist/percy.js
          gsed -i '/Update NODE_ENV for executable/{s//\nprocess.env.NODE_ENV = "executable";/;h};${x;/./{x;q0};x;q1}' ./packages/cli/bin/run.cjs
          npm run build_cjs
          cp -R ./build/* packages/
          pkg ./packages/cli/bin/run.js -d
          mv run-win.exe percy.exe
      - name: Upload win artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: percy.exe

  sign:
    needs: build
    name: Sign Win Executable
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5
      - name: Download win artifact
        uses: actions/download-artifact@v5
        with:
          name: win-exe
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 14
      - name: Install resedit
        run: npm install resedit
      - name: Update exe metadata
        run: node ./scripts/win-metadata-update.js
      - name: Install Google Cloud KMS CNG Provider
        run: |
          $cngUrl = "https://github.com/GoogleCloudPlatform/kms-integrations/releases/download/cng-v1.3/kmscng-1.3-windows-amd64.zip"
          Invoke-WebRequest -Uri $cngUrl -OutFile kmscng.zip
          Expand-Archive -Path kmscng.zip -DestinationPath kmscng
          Start-Process msiexec.exe -ArgumentList '/i', 'kmscng\kmscng-1.3-windows-amd64.msi', '/quiet', '/norestart' -Wait -NoNewWindow
          certutil -csplist | Select-String "Google Cloud KMS Provider" -Quiet
          if ($LASTEXITCODE -ne 0) { Write-Error "CNG Provider not found"; exit 1 }
      - name: Write GCP credentials
        run: |
          [System.Convert]::FromBase64String($Env:GCP_SA_B64) | Set-Content -Path gcp-sa-key.json -Encoding Byte
        env:
          GCP_SA_B64: ${{ secrets.GCP_WIN_CODESIGN_SA_KEY_B64 }}
      - name: Write certificate chain
        run: |
          [System.Convert]::FromBase64String($Env:CERT_B64) | Set-Content -Path comodo_signing_cert.crt -Encoding Byte
        env:
          CERT_B64: ${{ secrets.WIN_CODESIGN_CERT_CHAIN_B64 }}
      - name: Sign binary with Google Cloud KMS
        run: |
          $env:GOOGLE_APPLICATION_CREDENTIALS = "$PWD\gcp-sa-key.json"
          signtool.exe sign /fd sha256 /tr http://timestamp.sectigo.com /td sha256 /f comodo_signing_cert.crt /csp "Google Cloud KMS Provider" /kc "${{ secrets.GCP_KMS_KEY_PATH }}" percy.exe
          if ($LASTEXITCODE -ne 0) { Write-Error "Code signing failed!"; exit 1 }
          Write-Host "Code signing succeeded."
          signtool.exe verify /pa /v percy.exe
      - name: Clean up credentials
        if: always()
        run: |
          Remove-Item -Force gcp-sa-key.json -ErrorAction SilentlyContinue
          Remove-Item -Force comodo_signing_cert.crt -ErrorAction SilentlyContinue
      - name: Verify executable
        run: ./percy.exe --version
      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: percy-win-signed
          path: percy.exe
