name: Create Release PR

# Manually triggered from the Actions tab. You type the exact target version;
# this sets every package to it in lockstep (lerna fixed mode) and opens a
# "Release X.Y.Z" PR. Merging that PR + publishing a GitHub Release is what
# actually ships to npm.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Target version, e.g. 1.32.0-beta.5 (beta) or 1.32.0 (stable). Check the current version in lerna.json / on npm and type the next one.'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: yarn install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "percy-release-bot"
          git config user.email "percy-release-bot@users.noreply.github.com"

      - name: Bump version
        id: bump
        env:
          TARGET: ${{ inputs.version }}
        run: |
          set -euo pipefail

          # Validate the input is a plain semver (optionally with a -prerelease
          # suffix). Rejects typos before we touch any files.
          if ! [[ "$TARGET" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::'$TARGET' is not a valid version (expected e.g. 1.32.0 or 1.32.0-beta.5)."
            exit 1
          fi

          CURRENT=$(node -p "require('./lerna.json').version")

          # lerna accepts an explicit version as the positional bump argument.
          yarn lerna version "$TARGET" \
            --exact --no-git-tag-version --no-push --force-publish --yes

          VERSION=$(node -p "require('./lerna.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # A prerelease version (contains a hyphen) ships under the `beta`
          # npm dist-tag; a clean semver ships under `latest`.
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG=beta
          else
            DIST_TAG=latest
          fi
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"

          # Show current -> new in the run summary (visible after triggering).
          {
            echo "### Version bump"
            echo ""
            echo "\`$CURRENT\` → **\`$VERSION\`**  (npm dist-tag: \`$DIST_TAG\`)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: master
          branch: release/${{ steps.bump.outputs.version }}
          commit-message: "Release ${{ steps.bump.outputs.version }}"
          title: "Release ${{ steps.bump.outputs.version }}"
          labels: "🧹 maintenance"
          body: |
            Automated version bump to **`${{ steps.bump.outputs.version }}`**.

            - Triggered by @${{ github.actor }} via `workflow_dispatch`.
            - On publishing a GitHub Release, this will go to npm under dist-tag **`${{ steps.bump.outputs.dist_tag }}`**.

            **Next steps:** review & merge, then cut the GitHub Release.
