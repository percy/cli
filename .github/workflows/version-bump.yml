name: Create Release PR

# Manually triggered from the Actions tab. Pick a bump from the dropdown — each
# entry shows `current -> target`. This sets every package to the target version
# in lockstep (lerna fixed mode), refreshes the dropdown for the *next* release,
# and opens a "Release X.Y.Z" PR. Merging that PR + publishing a GitHub Release
# is what actually ships to npm.
#
# The options below are auto-generated by scripts/gen-release-options.mjs — do
# not hand-edit them; they refresh themselves on every release.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Current version 1.32.0-beta.5 — pick the bump (target version shown after ->):'  # AUTOGEN:description
        required: true
        type: choice
        options:
          # AUTOGEN:options-start
          - "prerelease (next beta): 1.32.0-beta.5 -> 1.32.0-beta.6"
          - "graduate to stable: 1.32.0-beta.5 -> 1.32.0"
          - "preminor (next beta line): 1.32.0-beta.5 -> 1.33.0-beta.0"
          - "premajor (next beta line): 1.32.0-beta.5 -> 2.0.0-beta.0"
          # AUTOGEN:options-end

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: yarn install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "percy-release-bot"
          git config user.email "percy-release-bot@users.noreply.github.com"

      - name: Bump version
        id: bump
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail

          # The dropdown label is "<bump>: <current> -> <target>". Extract the
          # target version (everything after the last "-> ").
          TARGET="${BUMP##*-> }"
          if ! [[ "$TARGET" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Could not parse a valid target version from '$BUMP'."
            exit 1
          fi

          CURRENT=$(node -p "require('./lerna.json').version")

          yarn lerna version "$TARGET" \
            --exact --no-git-tag-version --no-push --force-publish --yes

          VERSION=$(node -p "require('./lerna.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Refresh the dropdown so the *next* release shows the right mappings.
          node scripts/gen-release-options.mjs

          # A prerelease version (contains a hyphen) ships under the `beta`
          # npm dist-tag; a clean semver ships under `latest`.
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG=beta
          else
            DIST_TAG=latest
          fi
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"

          {
            echo "### Version bump"
            echo ""
            echo "\`$CURRENT\` → **\`$VERSION\`**  (npm dist-tag: \`$DIST_TAG\`)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: master
          branch: release/${{ steps.bump.outputs.version }}
          commit-message: "Release ${{ steps.bump.outputs.version }}"
          title: "Release ${{ steps.bump.outputs.version }}"
          labels: "🧹 maintenance"
          body: |
            Automated version bump to **`${{ steps.bump.outputs.version }}`**.

            - Triggered by @${{ github.actor }} via `workflow_dispatch`.
            - On publishing a GitHub Release, this will go to npm under dist-tag **`${{ steps.bump.outputs.dist_tag }}`**.
            - Includes a refreshed `Create Release PR` dropdown for the next release.

            **Next steps:** review & merge, then cut the GitHub Release.
