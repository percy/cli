name: Regression Tests

on:
  # Run on push to master for baseline updates
  push:
    branches: [master]
  # Trigger manually via Actions tab — pick any branch
  workflow_dispatch:

permissions:
  contents: read

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          # Full checkout so Percy can read git info (branch, commit, author, message)
          fetch-depth: 50

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn

      - uses: actions/cache@v3
        with:
          path: |
            packages/core/.local-chromium
          key: chromium-${{ runner.os }}-${{ hashFiles('packages/core/package.json') }}

      - name: Install browser dependencies
        run: sudo apt-get install -y libgbm-dev

      - name: Set up @percy/cli from branch
        run: |
          PERCY_PACKAGES=$(find packages -mindepth 1 -maxdepth 1 -type d | sed -e 's/packages/@percy/g' | tr '\n' ' ')
          yarn install --frozen-lockfile
          yarn build
          yarn global:link
          yarn link `echo $PERCY_PACKAGES`
          npx percy --version

      - name: Run regression tests
        run: yarn test:regression
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_REGRESSION_TOKEN }}
